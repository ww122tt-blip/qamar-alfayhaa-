version: '3.3'
services:
  evolution-api:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://138.68.133.239:8080
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE
      - CORS_CREDENTIALS=true
      - AUTH_TYPE=apikey
      - AUTH_API_KEY=qamar123
      - WEBOOK_GLOBAL_ENABLED=false
      - QRCODE_LIMIT=30
      - WA_BROWSER_WS_ENDPOINT=
      - DATABASE_ENABLED=false
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
volumes:
  evolution_instances:
  evolution_store:
